name: Build and Deploy Public Site

on:
  workflow_dispatch:
    inputs:
      dataset_paths:
        description: "Optional repo-relative dataset paths, one per line. If empty, files from data/private_snapshots/ are used."
        required: false
        default: ""
        type: string
      top_skills:
        description: "Top skills limit for analytics export."
        required: false
        default: "20"
        type: string
      top_pairs:
        description: "Top skill pair limit for analytics export."
        required: false
        default: "50"
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build-public-site:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Resolve snapshot source
        id: snapshot_source
        env:
          DATASET_PATHS_INPUT: ${{ inputs.dataset_paths }}
        run: |
          if [ -n "$DATASET_PATHS_INPUT" ]; then
            mapfile -t dataset_paths < <(printf '%s\n' "$DATASET_PATHS_INPUT" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | sed '/^$/d')
            mode="rebuild"
          elif [ -f public_stats/data/metadata.json ]; then
            mode="committed"
          else
            mapfile -t dataset_paths < <(find data/private_snapshots -type f \( -name '*.csv' -o -name '*.parquet' -o -name '*.json' -o -name '*.jsonl' -o -name '*.sqlite' -o -name '*.db' \) | sort)
            mode="rebuild"
          fi

          echo "mode=$mode" >> "$GITHUB_OUTPUT"

          if [ "$mode" = "rebuild" ]; then
            if [ "${#dataset_paths[@]}" -eq 0 ]; then
              echo "No dataset snapshot files found. Provide workflow_dispatch input dataset_paths or add files under data/private_snapshots/." >&2
              exit 1
            fi

            {
              echo "dataset_count=${#dataset_paths[@]}"
              echo "dataset_paths<<EOF"
              printf '%s\n' "${dataset_paths[@]}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Export analytics CSV
        if: steps.snapshot_source.outputs.mode == 'rebuild'
        env:
          DATASET_PATHS: ${{ steps.snapshot_source.outputs.dataset_paths }}
          TOP_SKILLS: ${{ inputs.top_skills }}
          TOP_PAIRS: ${{ inputs.top_pairs }}
        run: |
          mapfile -t dataset_paths < <(printf '%s\n' "$DATASET_PATHS")
          python scripts/export_analytics.py "${dataset_paths[@]}" \
            --output-dir analytics_output \
            --top-skills "$TOP_SKILLS" \
            --top-pairs "$TOP_PAIRS"

      - name: Build public JSON snapshots
        if: steps.snapshot_source.outputs.mode == 'rebuild'
        run: |
          python scripts/build_public_stats.py \
            --csv-dir analytics_output \
            --output-dir public_stats/data \
            --copy-csv-dir public_stats/csv

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Build static site
        working-directory: site
        run: |
          npm ci
          npm run build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload public stats artifact
        uses: actions/upload-artifact@v4
        with:
          name: public-stats
          path: |
            analytics_output/
            public_stats/
            site/dist/
          if-no-files-found: warn

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist/

  deploy:
    needs: build-public-site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
